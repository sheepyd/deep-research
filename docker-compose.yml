services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-deep_research}
      POSTGRES_USER: ${POSTGRES_USER:-deep_research}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deep_research}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-deep_research} -d ${POSTGRES_DB:-deep_research}
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      API_BEARER_TOKEN: ${API_BEARER_TOKEN:-change-me}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-deep_research}:${POSTGRES_PASSWORD:-deep_research}@postgres:5432/${POSTGRES_DB:-deep_research}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL_LIST: ${OPENAI_MODEL_LIST:-gpt-5.4-mini,gpt-5.4,gpt-5}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_MODEL_LIST: ${GOOGLE_MODEL_LIST:-gemini-2.5-flash,gemini-2.5-pro}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL_LIST: ${ANTHROPIC_MODEL_LIST:-claude-3-5-sonnet-latest,claude-3-7-sonnet-latest}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SEARXNG_BASE_URL: ${SEARXNG_BASE_URL:-http://host.docker.internal:8080}
      RESEARCH_CONCURRENCY: ${RESEARCH_CONCURRENCY:-2}
      SSE_KEEPALIVE_SECONDS: ${SSE_KEEPALIVE_SECONDS:-15}
      MCP_AI_PROVIDER: ${MCP_AI_PROVIDER:-}
      MCP_THINKING_MODEL: ${MCP_THINKING_MODEL:-}
      MCP_TASK_MODEL: ${MCP_TASK_MODEL:-}
      MCP_SEARCH_PROVIDER: ${MCP_SEARCH_PROVIDER:-}
      MCP_LANGUAGE: ${MCP_LANGUAGE:-zh-CN}
      MCP_MAX_RESULTS: ${MCP_MAX_RESULTS:-5}
    command: >
      sh -c "uv run alembic upgrade head &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://127.0.0.1:8000/api/v1/health")
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
