services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: deep_research
      POSTGRES_USER: deep_research
      POSTGRES_PASSWORD: deep_research
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    env_file:
      - ./.env
    environment:
      DATABASE_URL: postgresql+asyncpg://deep_research:deep_research@postgres:5432/deep_research
    command: >
      sh -c "uv run alembic upgrade head &&
      uv run uvicorn app.main:app --host 0.0.0.0 --port 8000"
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  frontend:
    build:
      context: ./frontend
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
